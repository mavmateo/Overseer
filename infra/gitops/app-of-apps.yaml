apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: og-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://example.invalid/replace-with-your-git-remote.git
    targetRevision: main
    path: infra/k8s/overlays/central-prod
  destination:
    server: https://kubernetes.default.svc
    namespace: og-apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
