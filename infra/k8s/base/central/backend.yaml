apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: og-apps
data:
  DEPLOYMENT_MODE: production
  API_PORT: "8000"
  DATABASE_URL: postgresql://platform_app@timescaledb-rw.og-core.svc.cluster.local:5432/og_iot
  KAFKA_BOOTSTRAP_SERVERS: kafka.og-core.svc.cluster.local:9092
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: og-apps
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/replace-me/og-backend:stable
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: backend-config
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: og-apps
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 8000
      targetPort: http

