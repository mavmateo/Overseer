apiVersion: v1
kind: ConfigMap
metadata:
  name: live-feed-config
  namespace: og-apps
data:
  MQTT_BROKER_URL: mqtt://mosquitto.og-edge.svc.cluster.local:1883
  LIVE_FEED_PORT: "8090"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: live-feed-adapter
  namespace: og-apps
spec:
  replicas: 2
  selector:
    matchLabels:
      app: live-feed-adapter
  template:
    metadata:
      labels:
        app: live-feed-adapter
    spec:
      containers:
        - name: live-feed-adapter
          image: ghcr.io/replace-me/og-live-feed-adapter:stable
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: live-feed-config
          ports:
            - containerPort: 8090
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: live-feed-adapter
  namespace: og-apps
spec:
  selector:
    app: live-feed-adapter
  ports:
    - name: http
      port: 8090
      targetPort: http

